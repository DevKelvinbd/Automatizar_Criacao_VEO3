name: Build Windows EXE

on:
  push:
    branches: [main, release/trava-maio-2026]
    paths:
      - "**.py"
      - "veo3_windows.spec"
      - "templates/**"
      - "prompts/**"
      - "requirements.txt"
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Build EXE with PyInstaller
        run: pyinstaller veo3_windows.spec --clean -y

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VEO3-Windows
          path: dist/VEO3.exe
          retention-days: 30

      - name: Create Release (trava branch only)
        if: github.ref == 'refs/heads/release/trava-maio-2026'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-trava-maio2026
          name: "VEO3 Windows - Trava Maio 2026"
          body: "Build Windows com trava de expiração em 10/05/2026."
          files: dist/VEO3.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
